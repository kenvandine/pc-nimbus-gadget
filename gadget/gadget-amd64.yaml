volumes:
  pc:
    schema: gpt
    # bootloader configuration is shipped and managed by snapd
    bootloader: grub
    structure:
      - name: mbr
        type: mbr
        size: 440
        update:
          edition: 1
        # This mbr simply writes an error to the console, as this
        # gadget supports gpt only
        content:
          - image: mbr.img
        # This one should be removed if we find a way to allow updates
        # without keeping all partitions.
      - name: BIOS Boot
        type: 21686148-6449-6E6F-744E-656564454649
        size: 1M
        offset: 1M
        update:
          edition: 2
      - name: ubuntu-seed
        role: system-seed
        filesystem: vfat
        # UEFI will boot the ESP partition by default first
        type: C12A7328-F81F-11D2-BA4B-00A0C93EC93B
        # Size of around two seeds to allow for remodeling
        size: 3600M
        update:
          edition: 3
        content:
          - source: grubx64.efi
            target: EFI/ubuntu/grubx64.efi
          - source: shim.efi.signed
            target: EFI/ubuntu/shimx64.efi
          - source: boot.csv
            target: EFI/ubuntu/bootx64.csv
          - source: fb.efi
            target: EFI/boot/fbx64.efi
          - source: shim.efi.signed
            target: EFI/boot/bootx64.efi
      - name: ubuntu-boot
        role: system-boot
        filesystem: ext4
        type: 0FC63DAF-8483-4772-8E79-3D69D8477DE4
        # Around 300M would be enough, but keeping as is to allow
        # remodeling from previous releases
        size: 750M
        update:
          edition: 1
        content:
          - source: grubx64.efi
            target: EFI/boot/grubx64.efi
      - name: ubuntu-save
        role: system-save
        filesystem: ext4
        type: 0FC63DAF-8483-4772-8E79-3D69D8477DE4
        # min-size to allow remodeling from previous releases
        min-size: 16M
        size: 32M
      - name: ubuntu-data
        role: system-data
        filesystem: ext4
        type: 0FC63DAF-8483-4772-8E79-3D69D8477DE4
        size: 1G
        content:
          - source: motd
            target: system-data/etc/motd

kernel-cmdline:
  append:
    - quiet
    - splash
    # Disable NXP NCI I2C (NFC) driver — generates an IRQ storm on AMD hardware
    - modprobe.blacklist=nxp_nci_i2c

